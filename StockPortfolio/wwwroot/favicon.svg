<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 深色背景，圓角符合現代感 -->
  <rect width="32" height="32" rx="6" fill="#1e1b4b"/>

  <!-- 底部基準線 -->
  <line x1="3" y1="27" x2="29" y2="27" stroke="#93c5fd" stroke-width="1" stroke-opacity="0.3"/>

  <!-- 上升折線 -->
  <polyline
    points="3,24  8,19  13,21  19,13  26,7"
    fill="none"
    stroke="#93c5fd"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- 頂端箭頭 -->
  <polyline
    points="21,7  26,7  26,12"
    fill="none"
    stroke="#f87171"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
